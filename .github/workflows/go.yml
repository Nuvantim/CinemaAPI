name: Golang Workflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ["api-gateway", "cinema-service", "booking-service"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: install golang
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'
          cache: true

      - name: install dependency
        run: go mod tidy
        working-directory: ${{ matrix.project }}

      - name: run test
        run: go test -v -race ./... 
        working-directory: ${{ matrix.project }}

      - name: run vet
        run: go vet ./... 
        working-directory: ${{ matrix.project }}

      - name: build project
        run: make build
        working-directory: ${{ matrix.project }}

  staticcheck:
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ["api-gateway", "cinema-service", "booking-service"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          working-directory: ${{ matrix.project }}

  vulncheck:
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ["api-gateway", "cinema-service", "booking-service"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.24.9
          go-package: ${{ matrix.project }}/...

  coverage:
    needs: build-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ["api-gateway", "cinema-service", "booking-service"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'

      - name: generate coverage profile
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./... 
        working-directory: ${{ matrix.project }}
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ matrix.project }}/coverage.out
